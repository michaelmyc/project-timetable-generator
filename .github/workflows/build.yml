name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — arm64 (Apple Silicon) and x86_64 (Intel)
          - os: macos
            arch: arm64
            runner: macos-14
          - os: macos
            arch: x86_64
            runner: macos-15-intel
          # Windows — x86_64
          - os: windows
            arch: x86_64
            runner: windows-latest
          # Linux — x86_64
          - os: linux
            arch: x86_64
            runner: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux only)
        if: matrix.os == 'linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libgtk-3-0 libwebkit2gtk-4.1-0 libglib2.0-0 \
            libegl1 libgl1 libgstreamer1.0-0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/

      - name: Build binary
        shell: bash
        run: |
          bash scripts/build.sh --native

      - name: Package artifact (macOS)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          cd dist && zip -ry "timetable-generator-${{ matrix.os }}-${{ matrix.arch }}.zip" timetable-generator.app && cd ..

      - name: Package artifact (Windows)
        if: matrix.os == 'windows'
        shell: powershell
        run: |
          Compress-Archive -Path dist/timetable-generator* -DestinationPath dist/timetable-generator-${{ matrix.os }}-${{ matrix.arch }}.zip

      - name: Package artifact (Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          cd dist && tar czf "timetable-generator-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" timetable-generator && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: timetable-generator-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/timetable-generator-*.zip
            dist/timetable-generator-*.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
