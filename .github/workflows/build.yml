name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — arm64 (Apple Silicon) and x86_64 (Intel)
          - os: macos
            arch: arm64
            runner: macos-14
          - os: macos
            arch: x86_64
            runner: macos-13
          # Windows — x86_64
          - os: windows
            arch: x86_64
            runner: windows-latest
          # Linux — x86_64
          - os: linux
            arch: x86_64
            runner: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux only)
        if: matrix.os == 'linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libgtk-3-0 libwebkit2gtk-4.1-0 libglib2.0-0 \
            libegl1 libgl1 libgstreamer-1.0-0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/

      - name: Build binary (native window)
        shell: bash
        # macOS: onedir + --windowed → .app bundle (fast startup, double-clickable)
        # Windows/Linux: onefile + --windowed → single executable
        run: bash scripts/build.sh --native

      - name: Package artifact
        shell: bash
        run: |
          APP_NAME="timetable-generator"
          ARCH="${{ matrix.arch }}"
          OS="${{ matrix.os }}"
          if [ "$OS" = "macos" ]; then
            # onedir + --windowed produces timetable-generator.app bundle
            cd dist && zip -ry "${APP_NAME}-${OS}-${ARCH}.zip" "${APP_NAME}.app" && cd ..
          else
            # Windows/Linux: onefile produces a single executable
            cd dist && zip "${APP_NAME}-${OS}-${ARCH}.zip" ${APP_NAME}* && cd ..
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: timetable-generator-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/timetable-generator-*.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.zip
